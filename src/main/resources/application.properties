spring.application.name=kidbank

# Database - Railway sets PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD automatically
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:kidbank}
spring.datasource.username=${PGUSER:kidbank}
spring.datasource.password=${PGPASSWORD:kidbank}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}
