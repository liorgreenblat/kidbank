spring.application.name=kidbank

# Database - override via environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kidbank}
spring.datasource.username=${DATABASE_USER:kidbank}
spring.datasource.password=${DATABASE_PASSWORD:kidbank}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}
